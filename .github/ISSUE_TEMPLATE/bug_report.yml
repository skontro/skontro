name: Bug report
description: Report a defect or unexpected behavior in Skontro.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce and resolve the issue quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: When generating an XRechnung invoice, the BT-30 seller VAT identifier is missing...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably reproduce the issue.
      placeholder: |
        1. Create a new invoice via POST /api/invoices
        2. Set seller.vat_id to "DE123456789"
        3. Export as XRechnung XML
        4. Observe missing BT-30
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages verbatim.
    validations:
      required: true

  - type: input
    id: env-skontro
    attributes:
      label: Skontro version
      description: Run `skontro --version` or check the footer of the web UI.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: env-os
    attributes:
      label: Operating system
      placeholder: "Windows 11 24H2 / Ubuntu 24.04 / macOS 15.3"
    validations:
      required: true

  - type: input
    id: env-browser
    attributes:
      label: Browser (if web UI)
      placeholder: "Chrome 132 / Firefox 134 / Safari 18.2"
    validations:
      required: false

  - type: input
    id: env-postgres
    attributes:
      label: PostgreSQL version
      placeholder: "17.2"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant log excerpts (redact secrets) or attach screenshots.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this affect you or your users?
      options:
        - low — cosmetic or minor inconvenience
        - medium — feature works but degraded
        - high — feature broken, workaround exists
        - critical — data loss, security, or compliance breach
    validations:
      required: true
